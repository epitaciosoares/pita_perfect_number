openapi:
  title: ppn_backend API
  version: 1.0.0
  description: API gerada automaticamente pelo Vaden.
  enable: true

server:
  port: 8080
  host: localhost

storage:
  provider: local  # opções: local, s3, firebase
  local:
    folder: './uploads'
  s3:
    bucket: 'meu-bucket'
    region: 'us-east-1'
    accessKey: 'sua_access_key'
    secretKey: 'seu_secret_key'
  firebase:
    projectId: 'my-project'
    apiKey: 'my_api'

security:
  secret: nb2VItJUA8NYPsQpmDnxl8jqYrlQtB5/MMAYuHFvzHs=
  tokenValidity: 3600
  refreshTokenValidity: 604800
  issuer: "vaden"
  audiences:
    - "vaden"

env:
  mode: debug

